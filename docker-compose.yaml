# nginx proxy address - http://172.17.0.1:8083

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  calibre-web:
    image: linuxserver/calibre-web:latest
    container_name: calibre-web-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - calibre-web
    ports:
      - "8083:8083"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./rootfs/config/calibre-web:/config
      - ./rootfs/data/calibre-web:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  calibre-web:
    external: false
